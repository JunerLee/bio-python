<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" font-family="system-ui, -apple-system, sans-serif">

  <!-- 总背景 -->
  <rect width="680" height="500" fill="#f8f9fa" rx="12"/>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a237e">二维数组索引示意图</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#546e7a">蓝色=选整行  绿色=选整列  金色=单元格交叉点</text>
  <line x1="20" y1="56" x2="660" y2="56" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- 分隔线 -->
  <line x1="340" y1="62" x2="340" y2="360" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════
       左图：选整行 matrix[1, :]
       网格从 x=24 开始，行标签宽40，4列各宽62
       列: 64,126,188,250,312  总宽=64+4*62=312, x=24~336(裁到334)
       行标题行: y=75, h=28
       3行数据: y=103,h=44 / y=147,h=44 / y=191,h=44
       ═══════════════════════════════════════════ -->

  <!-- 左图标题 -->
