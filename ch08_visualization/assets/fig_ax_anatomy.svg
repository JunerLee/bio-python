<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000020"/>
    </filter>
    <!-- 小圆点标记（引线端点） -->
    <marker id="dotBlue" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#1565c0"/>
    </marker>
    <marker id="dotOrange" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#E65100"/>
    </marker>
    <marker id="dotPurple" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#6a1b9a"/>
    </marker>
    <marker id="dotGreen" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#2e7d32"/>
    </marker>
    <marker id="dotPink" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#c2185b"/>
    </marker>
    <marker id="dotGray" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- 主背景 -->
  <rect width="680" height="500" fill="#f0f4f8" rx="12"/>

  <!-- 标题 -->
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a237e">Matplotlib fig / ax 解剖图</text>
  <line x1="80" y1="44" x2="600" y2="44" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- ====== fig 画布（外层大矩形，虚线边框）====== -->
  <!-- fig 区域: x=130, y=55, w=420, h=330 -->
  <rect x="130" y="55" width="420" height="330" rx="10"
        fill="#f5f5f5" stroke="#78909c" stroke-width="2" stroke-dasharray="10,5" filter="url(#shadow)"/>

  <!-- ====== ax 坐标轴（内层矩形）====== -->
  <!-- ax 区域: x=170, y=90, w=330, h=260 -->
  <rect x="170" y="90" width="330" height="260" rx="4" fill="white" stroke="#90a4ae" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 图表标题区域 -->
  <rect x="170" y="90" width="330" height="34" rx="4" fill="#e8eaf6"/>
  <text x="335" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#3949ab">基因表达量随时间变化</text>

  <!-- Y 轴标签（竖排，在ax左侧） -->
  <text x="152" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#546e7a"
        transform="rotate(-90, 152, 222)">表达量（FPKM）</text>

  <!-- X 轴标签（底部，在ax下方） -->
  <text x="335" y="376" text-anchor="middle" font-size="12" font-weight="600" fill="#546e7a">时间点（天）</text>

  <!-- 网格线（Y方向） -->
  <line x1="170" y1="157" x2="500" y2="157" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="191" x2="500" y2="191" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="225" x2="500" y2="225" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="259" x2="500" y2="259" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="293" x2="500" y2="293" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y 轴数字 -->
  <text x="164" y="161" text-anchor="end" font-size="10" fill="#9e9e9e">10</text>
  <text x="164" y="229" text-anchor="end" font-size="10" fill="#9e9e9e">6</text>
  <text x="164" y="297" text-anchor="end" font-size="10" fill="#9e9e9e">2</text>

  <!-- Y 轴线 -->
  <line x1="170" y1="124" x2="170" y2="328" stroke="#78909c" stroke-width="1.5"/>

  <!-- X 轴线 -->
  <line x1="170" y1="328" x2="500" y2="328" stroke="#78909c" stroke-width="1.5"/>

  <!-- X 轴刻度 -->
  <line x1="170" y1="328" x2="170" y2="336" stroke="#78909c" stroke-width="1.5"/>
  <line x1="252" y1="328" x2="252" y2="336" stroke="#78909c" stroke-width="1.5"/>
  <line x1="334" y1="328" x2="334" y2="336" stroke="#78909c" stroke-width="1.5"/>
  <line x1="416" y1="328" x2="416" y2="336" stroke="#78909c" stroke-width="1.5"/>
  <line x1="500" y1="328" x2="500" y2="336" stroke="#78909c" stroke-width="1.5"/>

  <!-- X 轴数字 -->
  <text x="170" y="347" text-anchor="middle" font-size="10" fill="#9e9e9e">0</text>
  <text x="252" y="347" text-anchor="middle" font-size="10" fill="#9e9e9e">3</text>
  <text x="334" y="347" text-anchor="middle" font-size="10" fill="#9e9e9e">6</text>
  <text x="416" y="347" text-anchor="middle" font-size="10" fill="#9e9e9e">9</text>
  <text x="500" y="347" text-anchor="middle" font-size="10" fill="#9e9e9e">12</text>

  <!-- 折线1（蓝色实线）: (0,3)(3,7)(6,9)(9,6)(12,4) -->
  <!-- x: 170 + t/12*330; y: 328 - val/10*204 -->
  <!-- (0,3)→(170,267) (3,7)→(252,185) (6,9)→(334,144) (9,6)→(416,206) (12,4)→(500,247) -->
  <polyline points="170,267 252,185 334,144 416,206 500,247"
            fill="none" stroke="#1e88e5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="170" cy="267" r="4.5" fill="white" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="252" cy="185" r="4.5" fill="white" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="334" cy="144" r="4.5" fill="white" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="416" cy="206" r="4.5" fill="white" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="500" cy="247" r="4.5" fill="white" stroke="#1e88e5" stroke-width="2"/>

  <!-- 折线2（粉色虚线） -->
  <polyline points="170,298 252,262 334,232 416,272 500,285"
            fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3" stroke-linejoin="round"/>
  <circle cx="170" cy="298" r="3.5" fill="white" stroke="#e91e63" stroke-width="2"/>
  <circle cx="252" cy="262" r="3.5" fill="white" stroke="#e91e63" stroke-width="2"/>
  <circle cx="334" cy="232" r="3.5" fill="white" stroke="#e91e63" stroke-width="2"/>
  <circle cx="416" cy="272" r="3.5" fill="white" stroke="#e91e63" stroke-width="2"/>
  <circle cx="500" cy="285" r="3.5" fill="white" stroke="#e91e63" stroke-width="2"/>

  <!-- 图例框（右上角，在ax内） -->
  <rect x="368" y="130" width="118" height="58" rx="5" fill="white" stroke="#bdbdbd" stroke-width="1" filter="url(#shadow)"/>
  <line x1="376" y1="148" x2="400" y2="148" stroke="#1e88e5" stroke-width="2.5"/>
  <circle cx="388" cy="148" r="3.5" fill="white" stroke="#1e88e5" stroke-width="2"/>
  <text x="407" y="152" font-size="11" fill="#424242">基因 A</text>
  <line x1="376" y1="168" x2="400" y2="168" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="388" cy="168" r="3" fill="white" stroke="#e91e63" stroke-width="2"/>
  <text x="407" y="172" font-size="11" fill="#424242">基因 B</text>

  <!-- ====================================================== -->
  <!-- 标注标签 + 引线（所有标签放在绘图区域外部）           -->
  <!-- ====================================================== -->

  <!-- 1. fig（画布）→ 外框虚线 -->
  <!-- 标签在左下方 -->
  <rect x="16" y="336" width="96" height="36" rx="8" fill="#546e7a"/>
  <text x="64" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="white">fig</text>
  <text x="64" y="366" text-anchor="middle" font-size="10" fill="#eceff1">（画布）</text>
  <!-- 引线：从标签右上角到 fig 外框左边 -->
  <line x1="112" y1="344" x2="130" y2="344" stroke="#546e7a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotGray)"/>

  <!-- 2. ax（坐标轴区域）→ 内框 -->
  <!-- 标签在右下方 -->
  <rect x="558" y="282" width="106" height="36" rx="8" fill="#1a237e"/>
  <text x="611" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="white">ax</text>
  <text x="611" y="312" text-anchor="middle" font-size="10" fill="#c5cae9">（坐标轴区域）</text>
  <!-- 引线：从标签左边到 ax 右框 -->
  <line x1="558" y1="300" x2="500" y2="300" stroke="#1a237e" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotBlue)"/>

  <!-- 3. 标题 title → 图表标题区 -->
  <!-- 标签在右上方 -->
  <rect x="558" y="60" width="112" height="36" rx="8" fill="#3949ab"/>
  <text x="614" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">标题 title</text>
  <text x="614" y="90" text-anchor="middle" font-size="10" fill="#c5cae9">ax.set_title()</text>
  <!-- 引线：从标签左边到标题区右边 -->
  <line x1="558" y1="78" x2="500" y2="107" stroke="#3949ab" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotBlue)"/>

  <!-- 4. X轴标签 xlabel → X轴标签文字 -->
  <!-- 标签在左下角 -->
  <rect x="16" y="400" width="120" height="36" rx="8" fill="#6a1b9a"/>
  <text x="76" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="white">X轴标签 xlabel</text>
  <text x="76" y="430" text-anchor="middle" font-size="10" fill="#e1bee7">ax.set_xlabel()</text>
  <!-- 引线：从标签右边到X轴标签 -->
  <line x1="136" y1="418" x2="254" y2="376" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotPurple)"/>

  <!-- 5. Y轴标签 ylabel → 左侧竖排文字 -->
  <!-- 标签在最左边 -->
  <rect x="16" y="155" width="120" height="36" rx="8" fill="#E65100"/>
  <text x="76" y="171" text-anchor="middle" font-size="12" font-weight="700" fill="white">Y轴标签 ylabel</text>
  <text x="76" y="185" text-anchor="middle" font-size="10" fill="#ffe0b2">ax.set_ylabel()</text>
  <!-- 引线：从标签右边到Y轴标签文字 -->
  <line x1="136" y1="173" x2="152" y2="200" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotOrange)"/>

  <!-- 6. 刻度 ticks → X轴刻度线 -->
  <!-- 标签在右下方 -->
  <rect x="558" y="388" width="108" height="36" rx="8" fill="#2e7d32"/>
  <text x="612" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="white">刻度 ticks</text>
  <text x="612" y="418" text-anchor="middle" font-size="10" fill="#c8e6c9">ax.set_xticks()</text>
  <!-- 引线：从标签左边到X轴刻度处 -->
  <line x1="558" y1="400" x2="416" y2="336" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotGreen)"/>

  <!-- 7. 图例 legend → 图例框 -->
  <!-- 标签在右上方，位于图例框右侧 -->
  <rect x="558" y="130" width="108" height="36" rx="8" fill="#c2185b"/>
  <text x="612" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="white">图例 legend</text>
  <text x="612" y="160" text-anchor="middle" font-size="10" fill="#fce4ec">ax.legend()</text>
  <!-- 引线：从标签左边到图例框右边 -->
  <line x1="558" y1="148" x2="486" y2="159" stroke="#c2185b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#dotPink)"/>

  <!-- ====== 底部说明框 ====== -->
  <rect x="28" y="440" width="624" height="50" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="460" text-anchor="middle" font-size="12" fill="#546e7a">
    fig 是整张画布；ax 是画布上的坐标系。一张 fig 可以包含多个 ax（子图）。
  </text>
  <text x="340" y="480" text-anchor="middle" font-size="11" fill="#78909c">
    使用 fig, ax = plt.subplots() 同时创建两者
  </text>
</svg>
