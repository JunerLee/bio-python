<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fbff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0faf2;stop-opacity:1" />
    </linearGradient>
    <!-- 特征列高亮（蓝色半透明） -->
    <linearGradient id="featGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#90CAF9;stop-opacity:0.3" />
    </linearGradient>
    <!-- 标签列高亮（绿色半透明） -->
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9;stop-opacity:0.65" />
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:0.35" />
    </linearGradient>
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0" />
      <stop offset="100%" style="stop-color:#0D47A1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000022" />
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0000001a" />
    </filter>
    <filter id="tagShadow" x="-5%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
  </defs>

  <!-- 整体背景 -->
  <rect width="700" height="500" rx="14" fill="url(#bgGrad)" />
  <rect width="700" height="500" rx="14" fill="none" stroke="#BBDEFB" stroke-width="2"/>

  <!-- 顶部标题栏 -->
  <rect x="20" y="14" width="640" height="52" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="340" y="47" text-anchor="middle" font-size="20" font-weight="bold" fill="white" letter-spacing="1">鸢尾花数据集：特征（X）与标签（y）</text>

  <!-- 副标题 -->
  <text x="340" y="84" text-anchor="middle" font-size="13" fill="#78909C">机器学习中，数据由 <tspan font-weight="bold" fill="#1565C0">特征（输入）</tspan> 和 <tspan font-weight="bold" fill="#2E7D32">标签（目标输出）</tspan> 两部分组成</text>

  <!-- ===== 鸢尾花简笔画（右上角装饰） ===== -->
  <g transform="translate(582, 90)" opacity="0.92">
    <!-- 花茎 -->
    <line x1="40" y1="118" x2="40" y2="80" stroke="#43A047" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 叶片 -->
    <ellipse cx="30" cy="102" rx="14" ry="7" fill="#66BB6A" transform="rotate(-30,30,102)"/>
    <ellipse cx="50" cy="95" rx="13" ry="6" fill="#81C784" transform="rotate(30,50,95)"/>
    <!-- 花瓣（6瓣，交替颜色） -->
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#7E57C2" opacity="0.85"/>
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#AB47BC" opacity="0.75" transform="rotate(60,40,60)"/>
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#7E57C2" opacity="0.85" transform="rotate(120,40,60)"/>
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#CE93D8" opacity="0.7" transform="rotate(180,40,60)"/>
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#7E57C2" opacity="0.85" transform="rotate(240,40,60)"/>
    <ellipse cx="40" cy="60" rx="8" ry="20" fill="#AB47BC" opacity="0.75" transform="rotate(300,40,60)"/>
    <!-- 花心 -->
    <circle cx="40" cy="60" r="8" fill="#FFD54F"/>
    <circle cx="40" cy="60" r="4" fill="#FFA000"/>
    <!-- 标注 -->
    <text x="40" y="136" text-anchor="middle" font-size="10" fill="#9E9E9E">鸢尾花</text>
    <text x="40" y="148" text-anchor="middle" font-size="9" fill="#BDBDBD">Iris</text>
  </g>

  <!-- ===== 数据表格区域 ===== -->
  <rect x="20" y="98" width="548" height="224" rx="10" fill="white" filter="url(#softShadow)" stroke="#E3F2FD" stroke-width="1.5"/>

  <!-- 特征列高亮背景（蓝色，覆盖前4列） -->
  <rect x="100" y="98" width="362" height="224" rx="0" fill="url(#featGrad)"/>
  <!-- 标签列高亮背景（绿色，最后1列） -->
  <rect x="462" y="98" width="106" height="224" rx="0" fill="url(#labelGrad)"/>
  <!-- 圆角修补 -->
  <rect x="20" y="98" width="10" height="10" fill="white"/>
  <rect x="20" y="312" width="10" height="10" fill="white"/>
  <rect x="558" y="98" width="10" height="10" fill="white"/>
  <rect x="558" y="312" width="10" height="10" fill="white"/>
  <rect x="100" y="98" width="5" height="10" fill="url(#featGrad)"/>
  <rect x="462" y="98" width="5" height="10" fill="url(#labelGrad)"/>
  <rect x="462" y="308" width="5" height="10" fill="url(#labelGrad)"/>

  <!-- 表格边框 -->
  <rect x="20" y="98" width="548" height="224" rx="10" fill="none" stroke="#BBDEFB" stroke-width="1.5"/>

  <!-- 表头行背景 -->
  <rect x="20" y="98" width="548" height="46" rx="10" fill="#E3F2FD"/>
  <rect x="20" y="128" width="548" height="16" fill="#E3F2FD"/>

  <!-- 竖线分隔 -->
  <g stroke="#BBDEFB" stroke-width="1" opacity="0.8">
    <line x1="100" y1="98" x2="100" y2="322"/>
    <line x1="188" y1="98" x2="188" y2="322"/>
    <line x1="278" y1="98" x2="278" y2="322"/>
    <line x1="370" y1="98" x2="370" y2="322"/>
    <line x1="462" y1="98" x2="462" y2="322"/>
  </g>
  <!-- 横线分隔 -->
  <g stroke="#E3F2FD" stroke-width="1.2">
    <line x1="20" y1="144" x2="568" y2="144"/>
    <line x1="20" y1="214" x2="568" y2="214"/>
    <line x1="20" y1="284" x2="568" y2="284"/>
  </g>

  <!-- 表头文字 -->
  <g font-size="12.5" text-anchor="middle" font-weight="bold" fill="#37474F">
    <text x="60" y="124">样本编号</text>
    <text x="144" y="116" fill="#1565C0">花萼长度</text>
    <text x="144" y="131" fill="#1565C0">（cm）</text>
    <text x="233" y="116" fill="#1565C0">花萼宽度</text>
    <text x="233" y="131" fill="#1565C0">（cm）</text>
    <text x="324" y="116" fill="#1565C0">花瓣长度</text>
    <text x="324" y="131" fill="#1565C0">（cm）</text>
    <text x="416" y="116" fill="#1565C0">花瓣宽度</text>
    <text x="416" y="131" fill="#1565C0">（cm）</text>
    <text x="505" y="116" fill="#2E7D32">品种</text>
    <text x="505" y="131" fill="#2E7D32">（标签）</text>
  </g>

  <!-- ===== 数据行 1：setosa（紫色） ===== -->
  <rect x="21" y="145" width="546" height="69" fill="#FAFAFA" rx="0"/>
  <!-- 行号背景 -->
  <rect x="21" y="145" width="78" height="69" fill="#F5F5F5" rx="0"/>
  <text x="60" y="172" text-anchor="middle" font-size="13" fill="#757575">样本 1</text>
  <text x="60" y="192" text-anchor="middle" font-size="10" fill="#BDBDBD">#0001</text>
  <!-- 数据 -->
  <g font-size="18" font-weight="bold" text-anchor="middle" fill="#1A237E">
    <text x="144" y="187">5.1</text>
    <text x="233" y="187">3.5</text>
    <text x="324" y="187">1.4</text>
    <text x="416" y="187">0.2</text>
  </g>
  <!-- 标签 setosa -->
  <rect x="470" y="158" width="88" height="34" rx="17" fill="#7B1FA2" filter="url(#tagShadow)"/>
  <text x="514" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="white">setosa</text>

  <!-- ===== 数据行 2：versicolor（橙色） ===== -->
  <rect x="21" y="215" width="546" height="69" fill="#FFFDE7" rx="0" opacity="0.5"/>
  <rect x="21" y="215" width="78" height="69" fill="#F5F5F5" rx="0"/>
  <text x="60" y="242" text-anchor="middle" font-size="13" fill="#757575">样本 2</text>
  <text x="60" y="262" text-anchor="middle" font-size="10" fill="#BDBDBD">#0051</text>
  <g font-size="18" font-weight="bold" text-anchor="middle" fill="#1A237E">
    <text x="144" y="257">7.0</text>
    <text x="233" y="257">3.2</text>
    <text x="324" y="257">4.7</text>
    <text x="416" y="257">1.4</text>
  </g>
  <!-- 标签 versicolor -->
  <rect x="467" y="228" width="94" height="34" rx="17" fill="#E64A19" filter="url(#tagShadow)"/>
  <text x="514" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="white">versicolor</text>

  <!-- ===== 数据行 3：virginica（绿色） ===== -->
  <rect x="21" y="285" width="546" height="36" fill="#FAFAFA" rx="0"/>
  <rect x="21" y="285" width="78" height="36" fill="#F5F5F5" rx="0"/>
  <text x="60" y="305" text-anchor="middle" font-size="13" fill="#757575">样本 3</text>
  <text x="60" y="317" text-anchor="middle" font-size="10" fill="#BDBDBD">#0101</text>
  <g font-size="18" font-weight="bold" text-anchor="middle" fill="#1A237E">
    <text x="144" y="310">6.3</text>
    <text x="233" y="310">3.3</text>
    <text x="324" y="310">6.0</text>
    <text x="416" y="310">2.5</text>
  </g>
  <!-- 标签 virginica -->
  <rect x="468" y="290" width="91" height="28" rx="14" fill="#1565C0" filter="url(#tagShadow)"/>
  <text x="514" y="309" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">virginica</text>

  <!-- 底部省略号 -->
  <text x="284" y="336" text-anchor="middle" font-size="18" fill="#BDBDBD" letter-spacing="8">⋯⋯⋯</text>
  <text x="284" y="352" text-anchor="middle" font-size="11" fill="#BDBDBD">共 150 条样本数据</text>

  <!-- ===== 特征标注括号区域 ===== -->
  <!-- 蓝色括号：特征X -->
  <g fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="100,368 100,378 462,378 462,368"/>
    <line x1="281" y1="378" x2="281" y2="393"/>
  </g>
  <!-- 特征标注标签 -->
  <rect x="160" y="393" width="244" height="40" rx="20" fill="#1565C0" filter="url(#tagShadow)"/>
  <text x="282" y="409" text-anchor="middle" font-size="13" font-weight="bold" fill="white">特征 X</text>
  <text x="282" y="425" text-anchor="middle" font-size="11" fill="#BBDEFB">4 列数值数据（模型的输入）</text>

  <!-- ===== 标签标注括号区域 ===== -->
  <!-- 绿色括号：标签y -->
  <g fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="462,368 462,378 568,378 568,368"/>
    <line x1="515" y1="378" x2="515" y2="393"/>
  </g>
  <!-- 标签标注标签 -->
  <rect x="462" y="393" width="106" height="40" rx="20" fill="#2E7D32" filter="url(#tagShadow)"/>
  <text x="515" y="409" text-anchor="middle" font-size="13" font-weight="bold" fill="white">标签 y</text>
  <text x="515" y="425" text-anchor="middle" font-size="10" fill="#A5D6A7">目标输出</text>

  <!-- ===== 右侧品种说明卡片 ===== -->
  <rect x="576" y="145" width="108" height="220" rx="8" fill="white" filter="url(#softShadow)" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="576" y="145" width="108" height="28" rx="8" fill="#512DA8"/>
  <rect x="576" y="161" width="108" height="12" fill="#512DA8"/>
  <text x="630" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3 个品种</text>

  <!-- setosa 说明 -->
  <rect x="584" y="181" width="92" height="48" rx="6" fill="#F3E5F5"/>
  <circle cx="596" cy="200" r="5" fill="#7B1FA2"/>
  <text x="638" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#7B1FA2">setosa</text>
  <text x="638" y="210" text-anchor="middle" font-size="9" fill="#9E9E9E">山鸢尾</text>

  <!-- versicolor 说明 -->
  <rect x="584" y="235" width="92" height="48" rx="6" fill="#FBE9E7"/>
  <circle cx="596" cy="254" r="5" fill="#E64A19"/>
  <text x="638" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#E64A19">versicolor</text>
  <text x="638" y="263" text-anchor="middle" font-size="9" fill="#9E9E9E">变色鸢尾</text>

  <!-- virginica 说明 -->
  <rect x="584" y="289" width="92" height="48" rx="6" fill="#E3F2FD"/>
  <circle cx="596" cy="308" r="5" fill="#1565C0"/>
  <text x="638" y="304" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565C0">virginica</text>
  <text x="638" y="317" text-anchor="middle" font-size="8.5" fill="#9E9E9E">维吉尼亚鸢尾</text>

  <!-- ===== 底部说明区 ===== -->
  <rect x="20" y="444" width="640" height="46" rx="8" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="340" y="462" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1B5E20">💡 机器学习的本质：</text>
  <text x="340" y="481" text-anchor="middle" font-size="12" fill="#2E7D32">用 <tspan font-weight="bold">特征 X</tspan>（花萼/花瓣的4项测量值）→ 学习如何预测 → <tspan font-weight="bold">标签 y</tspan>（品种分类）</text>
</svg>
