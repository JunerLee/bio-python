<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafffe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000020" />
    </filter>
  </defs>

  <!-- 整体背景 -->
  <rect width="680" height="460" rx="12" fill="url(#bgGrad)" />
  <rect width="680" height="460" rx="12" fill="none" stroke="#E8EAF6" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <rect x="20" y="12" width="640" height="42" rx="8" fill="#3F51B5" filter="url(#shadow)"/>
  <text x="340" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="white" letter-spacing="1">混淆矩阵（Confusion Matrix）— 二分类示例</text>

  <!--
    布局规划（纵向）：
      y=12~54   : 标题
      y=64~96   : "模型预测" 列头区域
      y=64~96   : 列子头 (预测：有病 / 预测：没病)
      y=96      : 网格顶部边线
      y=96~240  : 第一行（实际：有病）→ 高144px
      y=240~384 : 第二行（实际：没病）→ 高144px
      y=384     : 网格底部边线
      y=390~410 : 底部指标小条
      y=415~455 : 底部说明行

    布局规划（横向）：
      x=20~110  : "真实情况"行头标签 (90px宽)
      x=110~120 : 行头与网格的间隔线区域
      x=120     : 网格左边线
      x=120~390 : 左列（宽270px）
      x=390     : 网格中线
      x=390~660 : 右列（宽270px）
      x=660     : 网格右边线
  -->

  <!-- ====== 顶部列头 ====== -->
  <!-- "模型预测" 大标题，横跨两列 -->
  <rect x="120" y="62" width="540" height="34" rx="6" fill="#1976D2"/>
  <text x="390" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white" letter-spacing="2">模型预测</text>

  <!-- 左列子头："预测：有病" -->
  <rect x="120" y="96" width="270" height="36" rx="0" fill="#1565C0"/>
  <text x="255" y="119" text-anchor="middle" font-size="13" font-weight="bold" fill="white">预测：有病 ✓</text>

  <!-- 右列子头："预测：没病" -->
  <rect x="390" y="96" width="270" height="36" rx="0" fill="#78909C"/>
  <text x="525" y="119" text-anchor="middle" font-size="13" font-weight="bold" fill="white">预测：没病 ✗</text>

  <!-- ====== 左侧行头 ====== -->
  <!-- "真实情况" 竖排大标题 -->
  <rect x="20" y="96" width="40" height="288" rx="6" fill="#37474F"/>
  <text x="40" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="white"
        transform="rotate(-90, 40, 240)" letter-spacing="2">真实情况</text>

  <!-- 上行头："实际：有病" -->
  <rect x="60" y="96" width="60" height="144" rx="0" fill="#EF9A9A"/>
  <text x="90" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F0000"
        transform="rotate(-90, 90, 168)" letter-spacing="1">实际：有病</text>

  <!-- 下行头："实际：没病" -->
  <rect x="60" y="240" width="60" height="144" rx="0" fill="#A5D6A7"/>
  <text x="90" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20"
        transform="rotate(-90, 90, 312)" letter-spacing="1">实际：没病</text>

  <!-- ====== 网格框线（细线） ====== -->
  <!-- 外框 -->
  <rect x="120" y="132" width="540" height="252" rx="0" fill="none" stroke="#B0BEC5" stroke-width="1.5"/>
  <!-- 中间竖线 -->
  <line x1="390" y1="132" x2="390" y2="384" stroke="#B0BEC5" stroke-width="1.5"/>
  <!-- 中间横线 -->
  <line x1="120" y1="258" x2="660" y2="258" stroke="#B0BEC5" stroke-width="1.5"/>

  <!-- 列头和网格之间的连接线 -->
  <line x1="120" y1="132" x2="120" y2="96" stroke="#1565C0" stroke-width="1"/>
  <line x1="390" y1="132" x2="390" y2="96" stroke="#B0BEC5" stroke-width="1"/>
  <line x1="660" y1="132" x2="660" y2="96" stroke="#78909C" stroke-width="1"/>

  <!-- ====== TP 单元格（左上）: x=120~390, y=132~258 ======
       单元格中心 x=255, y=195
       图标居中方案：图标圆圈 cx=195, 文字区 x=290（text-anchor=middle）
  -->
  <rect x="121" y="133" width="268" height="124" rx="0" fill="#E8F5E9"/>

  <!-- 图标圆圈（居中布局：左侧图标 + 右侧文字，整体水平居中） -->
  <circle cx="195" cy="175" r="22" fill="#4CAF50"/>
  <text x="195" y="183" text-anchor="middle" font-size="20" fill="white" font-weight="bold">✓</text>
  <!-- 文字区（居中对齐） -->
  <text x="290" y="167" text-anchor="middle" font-size="22" font-weight="bold" fill="#1B5E20">TP  真阳性</text>
  <text x="290" y="189" text-anchor="middle" font-size="12" fill="#388E3C">True Positive</text>
  <!-- 说明框（带具体数字）-->
  <rect x="130" y="205" width="250" height="44" rx="6" fill="#C8E6C9"/>
  <text x="255" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">正确！确实有病 → 42 人</text>
  <text x="255" y="240" text-anchor="middle" font-size="11" fill="#2E7D32">患者有病，模型也判为有病 ✓</text>

  <!-- ====== FN 单元格（右上）: x=390~660, y=132~258 ======
       单元格中心 x=525
       图标居中方案：图标圆圈 cx=465, 文字区 x=560（text-anchor=middle）
  -->
  <rect x="391" y="133" width="268" height="124" rx="0" fill="#FCE4EC"/>

  <!-- 图标圆圈 -->
  <circle cx="465" cy="175" r="22" fill="#E91E63"/>
  <text x="465" y="184" text-anchor="middle" font-size="22" fill="white" font-weight="bold">✗</text>
  <!-- 文字区 -->
  <text x="560" y="167" text-anchor="middle" font-size="22" font-weight="bold" fill="#880E4F">FN  假阴性</text>
  <text x="560" y="189" text-anchor="middle" font-size="12" fill="#C2185B">False Negative</text>
  <!-- 说明框（带具体数字）-->
  <rect x="400" y="205" width="250" height="44" rx="6" fill="#F48FB1"/>
  <text x="525" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#880E4F">漏诊！最危险 → 8 人 ⚠️</text>
  <text x="525" y="240" text-anchor="middle" font-size="11" fill="#AD1457">患者有病，但模型判为没病！</text>

  <!-- ====== FP 单元格（左下）: x=120~390, y=258~384 ======
       单元格中心 x=255
       图标居中方案：图标圆圈 cx=195, 文字区 x=290（text-anchor=middle）
  -->
  <rect x="121" y="259" width="268" height="124" rx="0" fill="#FFF3E0"/>

  <!-- 图标圆圈 -->
  <circle cx="195" cy="301" r="22" fill="#FF9800"/>
  <text x="195" y="310" text-anchor="middle" font-size="22" fill="white" font-weight="bold">!</text>
  <!-- 文字区 -->
  <text x="290" y="293" text-anchor="middle" font-size="22" font-weight="bold" fill="#E65100">FP  假阳性</text>
  <text x="290" y="315" text-anchor="middle" font-size="12" fill="#EF6C00">False Positive</text>
  <!-- 说明框（带具体数字）-->
  <rect x="130" y="331" width="250" height="44" rx="6" fill="#FFE0B2"/>
  <text x="255" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">误诊，需复查 → 5 人</text>
  <text x="255" y="366" text-anchor="middle" font-size="11" fill="#EF6C00">患者没病，模型误判为有病</text>

  <!-- ====== TN 单元格（右下）: x=390~660, y=258~384 ======
       单元格中心 x=525
       图标居中方案：图标圆圈 cx=465, 文字区 x=560（text-anchor=middle）
  -->
  <rect x="391" y="259" width="268" height="124" rx="0" fill="#E8F5E9"/>

  <!-- 图标圆圈 -->
  <circle cx="465" cy="301" r="22" fill="#4CAF50"/>
  <text x="465" y="310" text-anchor="middle" font-size="20" fill="white" font-weight="bold">✓</text>
  <!-- 文字区 -->
  <text x="560" y="293" text-anchor="middle" font-size="22" font-weight="bold" fill="#1B5E20">TN  真阴性</text>
  <text x="560" y="315" text-anchor="middle" font-size="12" fill="#388E3C">True Negative</text>
  <!-- 说明框（带具体数字）-->
  <rect x="400" y="331" width="250" height="44" rx="6" fill="#C8E6C9"/>
  <text x="525" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">正确！确实没病 → 45 人</text>
  <text x="525" y="366" text-anchor="middle" font-size="11" fill="#2E7D32">患者没病，模型也判为没病 ✓</text>

  <!-- ====== 底部指标小条（带具体数字）====== -->
  <rect x="20" y="392" width="640" height="24" rx="6" fill="#E8EAF6"/>
  <text x="340" y="408" text-anchor="middle" font-size="11" fill="#3F51B5">准确率=(42+45)/100=87%   精确率=42/(42+5)=89%   召回率=42/(42+8)=84%   ⚠ FN最危险（漏诊）</text>

  <!-- ====== 底部说明行 ====== -->
  <rect x="20" y="422" width="640" height="28" rx="6" fill="#EDE7F6"/>
  <text x="340" y="440" text-anchor="middle" font-size="11" fill="#512DA8">示例数据：100 例疾病筛查 | 准确率 = 诊断正确比例 | 精确率 = 有病预警中真正有病的比例 | 召回率 = 实际有病被检出的比例</text>

</svg>
