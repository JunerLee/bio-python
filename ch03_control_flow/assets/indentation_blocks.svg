<svg xmlns="http://www.w3.org/2000/svg" width="700" height="470" font-family="system-ui, -apple-system, sans-serif">

  <!-- 总背景 -->
  <rect width="700" height="470" fill="#f8f9fa" rx="12"/>

  <!-- 标题 -->
  <text x="350" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1a237e">缩进与代码块的从属关系</text>
  <line x1="60" y1="46" x2="640" y2="46" stroke="#c5cae9" stroke-width="1.5"/>

  <!-- ═══════ 缩进标尺 ═══════ -->
  <text x="36" y="64" font-size="11" fill="#616161" font-weight="600">缩进标尺</text>
  <!-- "4个空格"标注 —— 放在标尺横线上方 -->
  <text x="53" y="80" text-anchor="middle" font-size="9" fill="#616161" font-weight="600">4个空格</text>
  <!-- 标尺刻度 -->
  <line x1="36" y1="86" x2="36" y2="100" stroke="#9e9e9e" stroke-width="1.2"/>
  <line x1="70" y1="86" x2="70" y2="100" stroke="#9e9e9e" stroke-width="1.2"/>
  <line x1="36" y1="93" x2="70" y2="93" stroke="#9e9e9e" stroke-width="1.2"/>
  <text x="36" y="110" text-anchor="middle" font-size="9" fill="#9e9e9e">0</text>
  <text x="70" y="110" text-anchor="middle" font-size="9" fill="#9e9e9e">4</text>

  <!-- ═══════ 缩进辅助竖线 ═══════ -->
  <line x1="36" y1="112" x2="36" y2="416" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="70" y1="112" x2="70" y2="416" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  代码块 A（if 块）—— 红色系                      -->
  <!--  3行：if ph > 7:  /  print("碱性")  /  print("加酸中和") -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="28" y="118" width="406" height="86" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5"/>

  <!-- if ph > 7: -->
  <text x="36" y="142" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f"><tspan fill="#c62828" font-weight="700">if</tspan> ph &gt; 7<tspan fill="#c62828" font-weight="700">:</tspan></text>

  <!--     print("碱性")  —— 缩进行 -->
  <!-- 缩进区小圆点 (可视化4个空格) -->
  <circle cx="40" cy="167" r="1.5" fill="#d0d0d0"/>
  <circle cx="49" cy="167" r="1.5" fill="#d0d0d0"/>
  <circle cx="57" cy="167" r="1.5" fill="#d0d0d0"/>
  <circle cx="66" cy="167" r="1.5" fill="#d0d0d0"/>
  <text x="70" y="170" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"碱性"</tspan>)</text>

  <!--     print("加酸中和") -->
  <circle cx="40" cy="195" r="1.5" fill="#d0d0d0"/>
  <circle cx="49" cy="195" r="1.5" fill="#d0d0d0"/>
  <circle cx="57" cy="195" r="1.5" fill="#d0d0d0"/>
  <circle cx="66" cy="195" r="1.5" fill="#d0d0d0"/>
  <text x="70" y="198" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"加酸中和"</tspan>)</text>

  <!-- 右侧标注 A -->
  <line x1="434" y1="160" x2="456" y2="160" stroke="#ef9a9a" stroke-width="2"/>
  <text x="464" y="148" font-size="14" fill="#c62828" font-weight="700">代码块 A</text>
  <text x="464" y="166" font-size="12" fill="#757575">属于 if</text>
  <text x="464" y="184" font-size="11" fill="#9e9e9e">（ph &gt; 7 时执行）</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  代码块 B（elif 块）—— 蓝色系                    -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="28" y="212" width="406" height="58" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>

  <!-- elif ph == 7: -->
  <text x="36" y="236" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f"><tspan fill="#1565c0" font-weight="700">elif</tspan> ph == 7<tspan fill="#1565c0" font-weight="700">:</tspan></text>

  <!--     print("中性") -->
  <circle cx="40" cy="261" r="1.5" fill="#d0d0d0"/>
  <circle cx="49" cy="261" r="1.5" fill="#d0d0d0"/>
  <circle cx="57" cy="261" r="1.5" fill="#d0d0d0"/>
  <circle cx="66" cy="261" r="1.5" fill="#d0d0d0"/>
  <text x="70" y="264" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"中性"</tspan>)</text>

  <!-- 右侧标注 B -->
  <line x1="434" y1="241" x2="456" y2="241" stroke="#90caf9" stroke-width="2"/>
  <text x="464" y="238" font-size="14" fill="#1565c0" font-weight="700">代码块 B</text>
  <text x="464" y="256" font-size="12" fill="#757575">属于 elif</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  代码块 C（else 块）—— 绿色系                    -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="28" y="278" width="406" height="86" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>

  <!-- else: -->
  <text x="36" y="302" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#2e7d32" font-weight="700">else:</text>

  <!--     print("酸性") -->
  <circle cx="40" cy="327" r="1.5" fill="#d0d0d0"/>
  <circle cx="49" cy="327" r="1.5" fill="#d0d0d0"/>
  <circle cx="57" cy="327" r="1.5" fill="#d0d0d0"/>
  <circle cx="66" cy="327" r="1.5" fill="#d0d0d0"/>
  <text x="70" y="330" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"酸性"</tspan>)</text>

  <!--     print("需要加碱") -->
  <circle cx="40" cy="355" r="1.5" fill="#d0d0d0"/>
  <circle cx="49" cy="355" r="1.5" fill="#d0d0d0"/>
  <circle cx="57" cy="355" r="1.5" fill="#d0d0d0"/>
  <circle cx="66" cy="355" r="1.5" fill="#d0d0d0"/>
  <text x="70" y="358" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"需要加碱"</tspan>)</text>

  <!-- 右侧标注 C -->
  <line x1="434" y1="320" x2="456" y2="320" stroke="#a5d6a7" stroke-width="2"/>
  <text x="464" y="310" font-size="14" fill="#2e7d32" font-weight="700">代码块 C</text>
  <text x="464" y="328" font-size="12" fill="#757575">属于 else</text>
  <text x="464" y="346" font-size="11" fill="#9e9e9e">（其他情况时执行）</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  不缩进的行 —— 橙色系                            -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="28" y="378" width="406" height="36" rx="6" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>

  <!-- print("检测结束") —— 顶格 -->
  <text x="36" y="402" font-family="'Courier New','SF Mono',Consolas,monospace" font-size="14" fill="#37474f">print(<tspan fill="#2e7d32">"检测结束"</tspan>)</text>

  <!-- 右侧标注 -->
  <line x1="434" y1="396" x2="456" y2="396" stroke="#ffcc80" stroke-width="2"/>
  <text x="464" y="392" font-size="14" fill="#e65100" font-weight="700">无缩进</text>
  <text x="464" y="410" font-size="12" fill="#757575">不属于任何代码块</text>
  <text x="464" y="426" font-size="11" fill="#9e9e9e">（始终执行）</text>

  <!-- ═══════ 缩进区域高亮标注 ═══════ -->
  <!-- 黄色小标签标注"4格缩进" -->
  <rect x="37" y="153" width="30" height="15" rx="3" fill="#fff9c4" stroke="#fdd835" stroke-width="1"/>
  <text x="52" y="164" text-anchor="middle" font-size="8" fill="#f57f17" font-weight="700">4格</text>

  <!-- ═══════ 底部总结栏 ═══════ -->
  <rect x="28" y="434" width="644" height="28" rx="6" fill="#e8eaf6"/>
  <text x="350" y="453" text-anchor="middle" font-size="12" fill="#1a237e" font-weight="600">规则：冒号 : 后换行必须缩进 4 个空格 → 缩进的代码"属于"上面那行带冒号的语句</text>

</svg>
