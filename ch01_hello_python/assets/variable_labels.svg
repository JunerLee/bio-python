<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000025"/>
    </filter>
    <!-- 绿色液体渐变 -->
    <linearGradient id="liqGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <!-- 蓝色液体渐变 -->
    <linearGradient id="liqBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <!-- 橙色液体渐变 -->
    <linearGradient id="liqOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <!-- 试管玻璃高光渐变 -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fffe"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>

    <!--
      clipPaths for tube liquid containment.
      每支试管外壳: width=56, rx=24, 底部圆弧半径=24
      路径说明（以 tube1 为例，x=112, 顶部 y=143, 底部 y=318）:
        - 矩形从顶部往下直到圆弧开始点（底部以上 24px）
        - 底部用贝塞尔曲线模拟 rx=24 的圆角（左下 + 右下）
      clip path 顶部故意设置得非常高（y=0），确保液体顶部不被截断。
    -->

    <!-- tube1clip: 试管主体 x=112, y=143, width=56, height=175, rx=24 → 底部 y=318 -->
    <clipPath id="tube1clip">
      <path d="
        M 112,0
        L 168,0
        L 168,294
        Q 168,318 144,318
        L 136,318
        Q 112,318 112,294
        Z
      "/>
    </clipPath>

    <!-- tube2clip: 试管主体 x=312, y=143, width=56, height=175, rx=24 → 底部 y=318 -->
    <clipPath id="tube2clip">
      <path d="
        M 312,0
        L 368,0
        L 368,294
        Q 368,318 344,318
        L 336,318
        Q 312,318 312,294
        Z
      "/>
    </clipPath>

    <!-- tube3clip: 试管主体 x=482, y=143, width=56, height=175, rx=24 → 底部 y=318 -->
    <clipPath id="tube3clip">
      <path d="
        M 482,0
        L 538,0
        L 538,294
        Q 538,318 514,318
        L 506,318
        Q 482,318 482,294
        Z
      "/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="420" rx="16" fill="url(#bgGrad)"/>
  <rect width="680" height="420" rx="16" fill="none" stroke="#c8e6c9" stroke-width="2"/>

  <!-- 标题 -->
  <rect x="180" y="16" width="320" height="38" rx="19" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="340" y="41" font-size="16" font-weight="bold" fill="white" text-anchor="middle">变量 = 贴标签的试管</text>

  <!-- ====================================================== -->
  <!-- 试管 1：gene_name                                       -->
  <!-- 变量名标签区域 y=70~105，试管区域 y=115~345，间距充足    -->
  <!-- ====================================================== -->

  <!-- 变量名标签（悬浮在试管上方，y=70） -->
  <rect x="84" y="68" width="112" height="36" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="83" font-size="10" fill="#666">变量名</text>
  <text x="140" y="99" font-size="13" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="monospace">gene_name</text>
  <!-- 连接线：从标签底部到试管瓶颈 -->
  <line x1="140" y1="104" x2="140" y2="118" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 试管瓶塞 -->
  <rect x="122" y="115" width="36" height="10" rx="5" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1"/>
  <!-- 试管瓶颈 -->
  <rect x="128" y="124" width="24" height="22" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <!-- 试管主体外壳 -->
  <rect x="112" y="143" width="56" height="175" rx="24" fill="#e3f2fd" stroke="#90caf9" stroke-width="2" filter="url(#shadow)"/>
  <!-- 液体（绿色） -->
  <rect x="112" y="215" width="56" height="103" fill="url(#liqGreen)" clip-path="url(#tube1clip)" opacity="0.92"/>
  <!-- 液面波浪 -->
  <ellipse cx="140" cy="216" rx="26" ry="7" fill="#A5D6A7" opacity="0.85"/>
  <!-- 液体中的值文字 -->
  <text x="140" y="268" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">"BRCA1"</text>
  <!-- 玻璃高光 -->
  <rect x="120" y="150" width="8" height="110" rx="4" fill="url(#glassGrad)" opacity="0.8"/>
  <!-- 气泡 -->
  <circle cx="128" cy="240" r="3" fill="white" opacity="0.55"/>
  <circle cx="136" cy="228" r="2" fill="white" opacity="0.45"/>

  <!-- 类型标注 -->
  <rect x="95" y="330" width="90" height="34" rx="8" fill="#4CAF50" opacity="0.92" filter="url(#shadow)"/>
  <text x="140" y="345" font-size="11" fill="white" text-anchor="middle" font-weight="bold">str（文本）</text>
  <text x="140" y="360" font-size="10" fill="#e8f5e9" text-anchor="middle">字符串类型</text>
  <line x1="140" y1="318" x2="140" y2="330" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- ====================================================== -->
  <!-- 试管 2：sequence_length                                  -->
  <!-- ====================================================== -->

  <!-- 变量名标签（y=68，比试管高出足够距离） -->
  <rect x="272" y="68" width="136" height="36" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
  <text x="278" y="83" font-size="10" fill="#666">变量名</text>
  <text x="340" y="99" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="monospace">sequence_length</text>
  <!-- 连接线 -->
  <line x1="340" y1="104" x2="340" y2="118" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 试管瓶塞 -->
  <rect x="322" y="115" width="36" height="10" rx="5" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1"/>
  <!-- 试管瓶颈 -->
  <rect x="328" y="124" width="24" height="22" rx="4" fill="#fff8e1" stroke="#ffe082" stroke-width="1.5"/>
  <!-- 试管主体外壳 -->
  <rect x="312" y="143" width="56" height="175" rx="24" fill="#fff8e1" stroke="#ffe082" stroke-width="2" filter="url(#shadow)"/>
  <!-- 液体（蓝色） -->
  <rect x="312" y="200" width="56" height="118" fill="url(#liqBlue)" clip-path="url(#tube2clip)" opacity="0.92"/>
  <!-- 液面波浪 -->
  <ellipse cx="340" cy="201" rx="26" ry="7" fill="#90CAF9" opacity="0.85"/>
  <!-- 液体中的值 -->
  <text x="340" y="258" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">81189</text>
  <!-- 刻度线 -->
  <line x1="312" y1="222" x2="319" y2="222" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="312" y1="248" x2="319" y2="248" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="312" y1="274" x2="319" y2="274" stroke="#90caf9" stroke-width="1.5"/>
  <!-- 玻璃高光 -->
  <rect x="320" y="150" width="8" height="110" rx="4" fill="url(#glassGrad)" opacity="0.8"/>
  <!-- 气泡 -->
  <circle cx="328" cy="230" r="3" fill="white" opacity="0.55"/>
  <circle cx="336" cy="218" r="2" fill="white" opacity="0.45"/>

  <!-- 类型标注 -->
  <rect x="295" y="330" width="90" height="34" rx="8" fill="#2196F3" opacity="0.92" filter="url(#shadow)"/>
  <text x="340" y="345" font-size="11" fill="white" text-anchor="middle" font-weight="bold">int（整数）</text>
  <text x="340" y="360" font-size="10" fill="#e3f2fd" text-anchor="middle">整数类型</text>
  <line x1="340" y1="318" x2="340" y2="330" stroke="#2196F3" stroke-width="1.5"/>

  <!-- ====================================================== -->
  <!-- 试管 3：gc_content                                       -->
  <!-- ====================================================== -->

  <!-- 变量名标签（y=68） -->
  <rect x="456" y="68" width="108" height="36" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="462" y="83" font-size="10" fill="#666">变量名</text>
  <text x="510" y="99" font-size="13" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="monospace">gc_content</text>
  <!-- 连接线 -->
  <line x1="510" y1="104" x2="510" y2="118" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 试管瓶塞 -->
  <rect x="492" y="115" width="36" height="10" rx="5" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1"/>
  <!-- 试管瓶颈 -->
  <rect x="498" y="124" width="24" height="22" rx="4" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <!-- 试管主体外壳 -->
  <rect x="482" y="143" width="56" height="175" rx="24" fill="#fce4ec" stroke="#f48fb1" stroke-width="2" filter="url(#shadow)"/>
  <!-- 液体（橙色） -->
  <rect x="482" y="235" width="56" height="83" fill="url(#liqOrange)" clip-path="url(#tube3clip)" opacity="0.92"/>
  <!-- 液面波浪 -->
  <ellipse cx="510" cy="236" rx="26" ry="7" fill="#FFCC80" opacity="0.85"/>
  <!-- 液体中的值 -->
  <text x="510" y="280" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">0.423</text>
  <!-- 玻璃高光 -->
  <rect x="490" y="150" width="8" height="110" rx="4" fill="url(#glassGrad)" opacity="0.8"/>
  <!-- 气泡 -->
  <circle cx="498" cy="260" r="3" fill="white" opacity="0.55"/>
  <circle cx="506" cy="248" r="2" fill="white" opacity="0.45"/>

  <!-- 类型标注 -->
  <rect x="465" y="330" width="92" height="34" rx="8" fill="#FF9800" opacity="0.92" filter="url(#shadow)"/>
  <text x="511" y="345" font-size="11" fill="white" text-anchor="middle" font-weight="bold">float（小数）</text>
  <text x="511" y="360" font-size="10" fill="#fff3e0" text-anchor="middle">浮点数类型</text>
  <line x1="510" y1="318" x2="510" y2="330" stroke="#FF9800" stroke-width="1.5"/>

  <!-- 底部说明区 -->
  <rect x="30" y="374" width="620" height="36" rx="12" fill="white" stroke="#c8e6c9" stroke-width="1.5" opacity="0.85"/>
  <text x="340" y="388" font-size="12" fill="#555" text-anchor="middle">💡 变量名（标签）用来找到数据，值（液体）是实际存储的内容</text>
  <text x="340" y="405" font-size="11" fill="#2e7d32" text-anchor="middle" font-weight="bold">标签名 = 值　→　变量名 = 数据</text>
</svg>
