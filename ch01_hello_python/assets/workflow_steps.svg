<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- Step gradients -->
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#90A4AE"/>
    </marker>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="220" rx="12" fill="url(#bgGrad)"/>
  <rect width="680" height="220" rx="12" fill="none" stroke="#CFD8DC" stroke-width="1.5"/>

  <!-- 标题 -->
  <text x="340" y="26" font-size="14" font-weight="bold" fill="#455A64" text-anchor="middle">完整操作流程</text>

  <!-- ===================== STEP 1 ===================== -->
  <!-- 卡片背景 -->
  <rect x="16" y="42" width="138" height="148" rx="10" fill="url(#grad1)" stroke="#4CAF50" stroke-width="1.8" filter="url(#shadow)"/>
  <!-- 顶部色块 -->
  <rect x="16" y="42" width="138" height="36" rx="10" fill="#4CAF50"/>
  <rect x="16" y="58" width="138" height="20" fill="#4CAF50"/>
  <!-- 步骤编号 -->
  <circle cx="44" cy="60" r="11" fill="white" opacity="0.9"/>
  <text x="44" y="65" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">①</text>
  <!-- 步骤标题 -->
  <text x="98" y="55" font-size="13" font-weight="bold" fill="white" text-anchor="middle">新建文件</text>
  <text x="98" y="70" font-size="11" fill="#E8F5E9" text-anchor="middle">Create File</text>
  <!-- 内容 -->
  <text x="85" y="104" font-size="12" fill="#1B5E20" text-anchor="middle">左侧文件树</text>
  <text x="85" y="122" font-size="12" fill="#1B5E20" text-anchor="middle">右键 → 新建</text>
  <rect x="38" y="130" width="84" height="22" rx="6" fill="#4CAF50" opacity="0.18"/>
  <text x="80" y="145" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="monospace">hello.py</text>
  <text x="85" y="174" font-size="11" fill="#388E3C" text-anchor="middle">输入文件名</text>

  <!-- 箭头 1 → 2 -->
  <line x1="158" y1="116" x2="176" y2="116" stroke="#90A4AE" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- ===================== STEP 2 ===================== -->
  <rect x="180" y="42" width="138" height="148" rx="10" fill="url(#grad2)" stroke="#2196F3" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="180" y="42" width="138" height="36" rx="10" fill="#2196F3"/>
  <rect x="180" y="58" width="138" height="20" fill="#2196F3"/>
  <circle cx="208" cy="60" r="11" fill="white" opacity="0.9"/>
  <text x="208" y="65" font-size="13" font-weight="bold" fill="#1565C0" text-anchor="middle">②</text>
  <text x="262" y="55" font-size="13" font-weight="bold" fill="white" text-anchor="middle">写代码</text>
  <text x="262" y="70" font-size="11" fill="#E3F2FD" text-anchor="middle">Write Code</text>
  <!-- 代码示意 -->
  <rect x="194" y="88" width="110" height="82" rx="6" fill="#1a237e" opacity="0.08"/>
  <text x="203" y="105" font-size="11" fill="#546E7A" font-family="monospace">print(</text>
  <text x="203" y="121" font-size="11" fill="#E91E63" font-family="monospace">  "Hello"</text>
  <text x="203" y="137" font-size="11" fill="#546E7A" font-family="monospace">)</text>
  <text x="249" y="174" font-size="11" fill="#1565C0" text-anchor="middle">在编辑区输入代码</text>

  <!-- 箭头 2 → 3 -->
  <line x1="322" y1="116" x2="340" y2="116" stroke="#90A4AE" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- ===================== STEP 3 ===================== -->
  <rect x="344" y="42" width="138" height="148" rx="10" fill="url(#grad3)" stroke="#FF9800" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="344" y="42" width="138" height="36" rx="10" fill="#FF9800"/>
  <rect x="344" y="58" width="138" height="20" fill="#FF9800"/>
  <circle cx="372" cy="60" r="11" fill="white" opacity="0.9"/>
  <text x="372" y="65" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">③</text>
  <text x="426" y="55" font-size="13" font-weight="bold" fill="white" text-anchor="middle">保存</text>
  <text x="426" y="70" font-size="11" fill="#FFF3E0" text-anchor="middle">Save File</text>
  <!-- 快捷键示意 -->
  <rect x="374" y="92" width="56" height="38" rx="8" fill="white" stroke="#FF9800" stroke-width="2" opacity="0.9"/>
  <text x="402" y="107" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">Ctrl</text>
  <text x="402" y="122" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">+ S</text>
  <text x="413" y="152" font-size="12" fill="#E65100" text-anchor="middle">按下保存文件</text>
  <text x="413" y="174" font-size="11" fill="#BF360C" text-anchor="middle">（不保存不生效）</text>

  <!-- 箭头 3 → 4 -->
  <line x1="486" y1="116" x2="504" y2="116" stroke="#90A4AE" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- ===================== STEP 4 ===================== -->
  <rect x="508" y="42" width="156" height="148" rx="10" fill="url(#grad4)" stroke="#9C27B0" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="508" y="42" width="156" height="36" rx="10" fill="#9C27B0"/>
  <rect x="508" y="58" width="156" height="20" fill="#9C27B0"/>
  <circle cx="536" cy="60" r="11" fill="white" opacity="0.9"/>
  <text x="536" y="65" font-size="13" font-weight="bold" fill="#6A1B9A" text-anchor="middle">④</text>
  <text x="599" y="55" font-size="13" font-weight="bold" fill="white" text-anchor="middle">运行</text>
  <text x="599" y="70" font-size="11" fill="#F3E5F5" text-anchor="middle">Run Script</text>
  <!-- 终端示意 -->
  <rect x="520" y="88" width="132" height="50" rx="6" fill="#1a1a2e" opacity="0.88"/>
  <text x="528" y="104" font-size="10" fill="#4CAF50" font-family="monospace">$</text>
  <text x="538" y="104" font-size="10" fill="#d4d4d4" font-family="monospace"> uv run hello.py</text>
  <text x="528" y="120" font-size="10" fill="#ce9178" font-family="monospace">Hello, Biology!</text>
  <text x="528" y="133" font-size="10" fill="#4CAF50" font-family="monospace">$</text>
  <text x="538" y="133" font-size="10" fill="#d4d4d4" font-family="monospace"> █</text>
  <text x="586" y="152" font-size="11" fill="#6A1B9A" text-anchor="middle">终端输入命令</text>
  <text x="586" y="168" font-size="11" fill="#7B1FA2" text-anchor="middle">按 Enter 执行</text>

  <!-- 底部注释 -->
  <text x="340" y="207" font-size="11" fill="#78909C" text-anchor="middle">💡 每次修改代码后，重复 ③保存 → ④运行 即可查看新结果</text>
</svg>
