<svg xmlns="http://www.w3.org/2000/svg" width="630" height="410" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="630" height="410" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- 标题 -->
  <rect x="195" y="10" width="240" height="32" rx="16" fill="#455A64"/>
  <text x="315" y="31" font-size="13" font-weight="bold" fill="white" text-anchor="middle">类型转换速查表</text>

  <!-- ================================================================ -->
  <!-- 表头行 y=50 h=38                                                 -->
  <!-- ================================================================ -->

  <!-- 左上角（"从 ↓  到 →"） -->
  <rect x="20" y="50" width="90" height="38" rx="8" fill="#455A64"/>
  <rect x="20" y="70" width="90" height="18" fill="#455A64"/>
  <text x="65" y="67" font-size="9.5" fill="#cfd8dc" text-anchor="middle">从 ↓  到 →</text>
  <text x="65" y="80" font-size="8" fill="#90a4ae" text-anchor="middle">source → target</text>

  <!-- 列头：→ int -->
  <rect x="110" y="50" width="125" height="38" fill="#BBDEFB"/>
  <text x="172" y="74" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">→ int</text>
  <!-- 列头：→ float -->
  <rect x="235" y="50" width="125" height="38" fill="#FFE0B2"/>
  <text x="297" y="74" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">→ float</text>
  <!-- 列头：→ str -->
  <rect x="360" y="50" width="125" height="38" fill="#C8E6C9"/>
  <text x="422" y="74" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">→ str</text>
  <!-- 列头：→ bool -->
  <rect x="485" y="50" width="125" height="38" fill="#F8BBD0"/>
  <text x="547" y="74" font-size="12" font-weight="bold" fill="#C2185B" text-anchor="middle">→ bool</text>

  <!-- ================================================================ -->
  <!-- 第1行：int 整数   y=88 h=62                                      -->
  <!-- ================================================================ -->

  <!-- 行头 -->
  <rect x="20" y="88" width="90" height="62" fill="#BBDEFB"/>
  <text x="65" y="117" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">int</text>
  <text x="65" y="134" font-size="9" fill="#1565C0" text-anchor="middle">整数</text>

  <!-- int → int（对角线：无需转换） -->
  <rect x="110" y="88" width="125" height="62" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="172" y="124" font-size="14" fill="#bbb" text-anchor="middle">—</text>

  <!-- int → float -->
  <rect x="235" y="88" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="297" y="114" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">float(3)</text>
  <text x="297" y="134" font-size="9" fill="#1565C0" text-anchor="middle" font-family="monospace">= 3.0</text>

  <!-- int → str -->
  <rect x="360" y="88" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="422" y="114" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">str(23)</text>
  <text x="422" y="134" font-size="9" fill="#2E7D32" text-anchor="middle" font-family="monospace">= "23"</text>

  <!-- int → bool -->
  <rect x="485" y="88" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="547" y="114" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">bool(0)</text>
  <text x="547" y="134" font-size="9" fill="#C2185B" text-anchor="middle" font-family="monospace">= False</text>

  <!-- ================================================================ -->
  <!-- 第2行：float 浮点数   y=150 h=62                                  -->
  <!-- ================================================================ -->

  <rect x="20" y="150" width="90" height="62" fill="#FFE0B2"/>
  <text x="65" y="176" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">float</text>
  <text x="65" y="194" font-size="9" fill="#E65100" text-anchor="middle">浮点数</text>

  <!-- float → int -->
  <rect x="110" y="150" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="172" y="176" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">int(3.7)</text>
  <text x="172" y="196" font-size="8.5" fill="#c62828" text-anchor="middle" font-family="monospace">= 3 ⚠ 截断</text>

  <!-- float → float（对角线） -->
  <rect x="235" y="150" width="125" height="62" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="297" y="186" font-size="14" fill="#bbb" text-anchor="middle">—</text>

  <!-- float → str -->
  <rect x="360" y="150" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="422" y="176" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">str(3.14)</text>
  <text x="422" y="196" font-size="9" fill="#2E7D32" text-anchor="middle" font-family="monospace">= "3.14"</text>

  <!-- float → bool -->
  <rect x="485" y="150" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="547" y="176" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">bool(0.0)</text>
  <text x="547" y="196" font-size="9" fill="#C2185B" text-anchor="middle" font-family="monospace">= False</text>

  <!-- ================================================================ -->
  <!-- 第3行：str 字符串   y=212 h=62                                    -->
  <!-- ================================================================ -->

  <rect x="20" y="212" width="90" height="62" fill="#C8E6C9"/>
  <text x="65" y="238" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">str</text>
  <text x="65" y="256" font-size="9" fill="#2E7D32" text-anchor="middle">字符串</text>

  <!-- str → int -->
  <rect x="110" y="212" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="172" y="238" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">int("23")</text>
  <text x="172" y="258" font-size="9" fill="#1565C0" text-anchor="middle" font-family="monospace">= 23</text>

  <!-- str → float -->
  <rect x="235" y="212" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="297" y="238" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">float("0.42")</text>
  <text x="297" y="258" font-size="9" fill="#E65100" text-anchor="middle" font-family="monospace">= 0.42</text>

  <!-- str → str（对角线） -->
  <rect x="360" y="212" width="125" height="62" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="422" y="248" font-size="14" fill="#bbb" text-anchor="middle">—</text>

  <!-- str → bool -->
  <rect x="485" y="212" width="125" height="62" fill="#fafafa" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="547" y="234" font-size="8.5" fill="#999" text-anchor="middle">较少使用</text>
  <text x="547" y="250" font-size="7.5" fill="#aaa" text-anchor="middle" font-family="monospace">bool("")→False</text>
  <text x="547" y="264" font-size="7.3" fill="#aaa" text-anchor="middle" font-family="monospace">bool("False")→True</text>

  <!-- ================================================================ -->
  <!-- 第4行：bool 布尔值   y=274 h=62                                   -->
  <!-- ================================================================ -->

  <rect x="20" y="274" width="90" height="62" fill="#F8BBD0"/>
  <text x="65" y="300" font-size="12" font-weight="bold" fill="#C2185B" text-anchor="middle">bool</text>
  <text x="65" y="318" font-size="9" fill="#C2185B" text-anchor="middle">布尔</text>

  <!-- bool → int -->
  <rect x="110" y="274" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="172" y="300" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">int(True)</text>
  <text x="172" y="320" font-size="9" fill="#1565C0" text-anchor="middle" font-family="monospace">= 1</text>

  <!-- bool → float -->
  <rect x="235" y="274" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="297" y="300" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">float(True)</text>
  <text x="297" y="320" font-size="9" fill="#E65100" text-anchor="middle" font-family="monospace">= 1.0</text>

  <!-- bool → str -->
  <rect x="360" y="274" width="125" height="62" fill="white" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="422" y="300" font-size="9.5" fill="#333" text-anchor="middle" font-family="monospace">str(True)</text>
  <text x="422" y="320" font-size="9" fill="#2E7D32" text-anchor="middle" font-family="monospace">= "True"</text>

  <!-- bool → bool（对角线） -->
  <rect x="485" y="274" width="125" height="62" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="547" y="310" font-size="14" fill="#bbb" text-anchor="middle">—</text>

  <!-- ================================================================ -->
  <!-- 外边框                                                           -->
  <!-- ================================================================ -->
  <rect x="20" y="50" width="590" height="286" rx="0" fill="none" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- ================================================================ -->
  <!-- 底部注意事项                                                     -->
  <!-- ================================================================ -->
  <rect x="40" y="352" width="550" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.2"/>
  <text x="60" y="370" font-size="11" font-weight="bold" fill="#E65100">⚠ 常见陷阱：</text>
  <text x="60" y="385" font-size="10" fill="#555" font-family="monospace">int("3.7")</text>
  <text x="142" y="385" font-size="10" fill="#555">会报错！必须先转 float 再转 int：</text>
  <text x="360" y="385" font-size="10" fill="#1565C0" font-weight="bold" font-family="monospace">int(float("3.7"))</text>
</svg>
